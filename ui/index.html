<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Safe Sync</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <main class="shell">
      <section class="status-panel">
        <p class="eyebrow">Tray status</p>
        <div class="title-row">
          <h1>Safe Sync</h1>
          <span class="status-pill" data-status-state data-health="unknown">Checking</span>
        </div>
        <p class="reason" data-status-reason>Reading backend status</p>
        <dl>
          <div>
            <dt>Backend</dt>
            <dd data-service-state>-</dd>
          </div>
          <div>
            <dt>Sync</dt>
            <dd data-sync-state>-</dd>
          </div>
          <div>
            <dt>Seen</dt>
            <dd data-daemon-seen>-</dd>
          </div>
          <div>
            <dt>Log</dt>
            <dd class="path" data-log-path>-</dd>
          </div>
        </dl>
        <div class="actions" aria-label="Backend controls">
          <button type="button" data-action="refresh">Refresh</button>
          <button type="button" data-action="start">Start</button>
          <button type="button" data-action="stop">Stop</button>
        </div>
      </section>
    </main>
  </body>
</html>
